<html>
<head>
  <title>Home</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="navbar-container">

    <!-- Left (can be empty or search later) -->
    <div></div>

    <!-- Center Logo -->
    <div class="nav-logo">AURELIA</div>

    <!-- Right Actions -->
    <div class="nav-actions">
      <a href="#" onclick="goProfile()">👤</a>
      <a href="cart.html" title="Cart">🛒</a>
    </div>


  </div>

  <!-- SECOND ROW: LINKS -->
  <div class="navbar-container" style="justify-content:center;">
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="aboutus.html">About Us</a>
      <a href="contactus.html">Contact Us</a>
      <a href="storelocator.html">Store Locator</a>
      <a href="#" onclick="goOrders()">My Orders</a>
      <a href="register.html">Sign Up</a>
    </div>
  </div>
</div>


<div class="container">

  <h2 class="section-heading">OUR COLLECTIONS</h2>

  <div id="products" class="products-grid"></div>

</div>


<script>
fetch("/products")
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById("products");

    if (data.length === 0) {
      container.innerHTML = "<p>No products found</p>";
      return;
    }

    data.forEach(p => {

      const isOut = p.stock === 0;

      container.innerHTML += `
        <div class="product-card ${isOut ? "out-of-stock" : ""}"
            ${!isOut ? `onclick="viewProduct('${p.product_id}')"` : ""}>
            
          <img src="${p.image}" alt="${p.name}">
          
          <div class="product-name">${p.name}</div>
          
          <div class="product-price">
            LKR. ${Number(p.price).toLocaleString()}
          </div>

          ${isOut ? `<div class="stock-badge">Out of Stock</div>` : ""}
        </div>
      `;
    });

  })
  .catch(err => {
    console.error(err);
    document.getElementById("products").innerText =
      "Error loading products";
  });

  // 🔹 Redirect to product details page with product_id
function viewProduct(productId) {
  window.location.href = "product.html?id=" + productId;
}

</script>

</body>
